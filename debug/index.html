<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员 · 后台挖坟</title>
  <link rel="stylesheet" href="/debug/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/rough.js/2.3.0/rough.min.js"></script>
</head>
<body>
<div class="container" id="app">
  <!-- 登录界面 -->
  <div id="loginPanel" class="login-panel">
    <h1>后台挖坟</h1>
    <p>输入管理员密码，看看集市下面埋了什么</p>
    <div class="login-form">
      <input type="password" id="adminPassword" placeholder="密码" autocomplete="off">
      <button id="loginBtn">开门</button>
    </div>
    <div id="loginError" class="error-msg"></div>
  </div>

  <!-- 管理界面（登录后显示） -->
  <div id="managePanel" style="display:none;">
    <div class="top-bar">
      <div class="server-brand">
        <img src="/img/command_block.png" alt="命令方块" onerror="this.style.display='none'">
        <h1>MCServer · 后台</h1>
      </div>
      <button id="logoutBtn" class="logout-btn">滚出去</button>
    </div>

    <div class="stats-bar">
      <span>总商品数：<strong id="totalCount">0</strong></span>
      <span>最新上架：<strong id="latestTime">-</strong></span>
      <button id="refreshBtn" class="refresh-btn">刷新地皮</button>
    </div>

    <div class="table-wrapper">
      <table id="itemsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>商品名</th>
            <th>单价</th>
            <th>数量</th>
            <th>卖家</th>
            <th>图标</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- 动态渲染 -->
        </tbody>
      </table>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModal" class="modal" style="display:none;">
      <div class="modal-content" id="roughModal">
        <h3>刨出来改</h3>
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>商品名</label>
          <input type="text" id="editName">
        </div>
        <div class="form-group">
          <label>单价（泥土）</label>
          <input type="number" id="editPrice" min="1">
        </div>
        <div class="form-group">
          <label>数量（个）</label>
          <input type="number" id="editQty" min="1">
        </div>
        <div class="form-group">
          <label>卖家ID</label>
          <input type="text" id="editSeller">
        </div>
        <div class="form-group">
          <label>图标链接</label>
          <input type="text" id="editIcon">
        </div>
        <div class="modal-actions">
          <button id="saveEditBtn">埋回去</button>
          <button id="cancelEditBtn">算了</button>
        </div>
        <div id="editError" class="error-msg"></div>
      </div>
    </div>

    <div id="toastContainer"></div>
  </div>
</div>

<script src="/debug/script.js"></script>
</body>
</html>
