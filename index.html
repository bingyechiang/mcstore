<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泥土商店服务器商城</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/rough.js/2.3.0/rough.min.js"></script>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <div class="server-brand">
      <img src="/img/command_block.png" alt="命令方块" onerror="this.style.display='none'">
      <h1>MCServer</h1>
    </div>
    <div class="currency">
      <img src="/img/dirt.png" alt="泥土" onerror="this.style.display='none'">
      <span>货币 · 泥土</span>
    </div>
  </div>

  <div class="search-area">
    <div class="search-box" id="roughSearch">
      <input type="text" id="searchInput" placeholder="搜商品名，坐标直接糊脸" autocomplete="off">
      <button id="searchBtn">戳我</button>
    </div>

    <div class="sort-controls">
      <span class="sort-label">排序</span>
      <button class="sort-btn active" data-sort="price-asc">价格 ↑</button>
      <button class="sort-btn" data-sort="price-desc">价格 ↓</button>
      <button class="sort-btn" data-sort="official-first">官方先</button>
      <button class="sort-btn" data-sort="player-first">集市先</button>
    </div>

    <div class="search-results" id="resultsList"></div>
  </div>

  <div class="nav-buttons">
    <a href="/store" class="nav-btn" id="btnStore">
      <img src="/img/command_block.png" alt="" onerror="this.style.display='none'">
      腐竹商城
      <span class="sub">/store</span>
    </a>
    <a href="/shop" class="nav-btn" id="btnShop">
      <img src="/img/dirt.png" alt="" onerror="this.style.display='none'">
      玩家集市
      <span class="sub">/shop</span>
    </a>
  </div>

  <div class="footer-note">再也不用盯着箱子挨个对名字了</div>
</div>

<script src="script.js"></script>
</body>
</html>
