<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>玩家集市</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/shop/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/rough.js/2.3.0/rough.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <meta http-equiv="Content-Security-Policy" content="img-src * data: blob: http: https:;">
</head>
<body>
<div class="container shop-container">

  <div class="top-bar">
    <div class="server-brand">
      <img src="/img/command_block.png" alt="命令方块" onerror="this.style.display='none'">
      <h1>MCServer</h1>
    </div>
    <div class="currency">
      <img src="/img/dirt.png" alt="泥土" onerror="this.style.display='none'">
      <span>泥土商店</span>
    </div>
  </div>

  <div class="shop-main">
    <!-- 左侧：商品列表 -->
    <div class="shop-list">
      <div class="shop-header">
        <h2>玩家市场</h2>
        <span class="count" id="itemCount">摆摊：0 件</span>
      </div>
      <div class="sort-controls shop-sort">
        <button class="sort-btn active" data-sort="latest">最新</button>
        <button class="sort-btn" data-sort="price-asc">价格 ↑</button>
        <button class="sort-btn" data-sort="price-desc">价格 ↓</button>
      </div>
      <div class="card-grid" id="cardGrid"></div>
    </div>

    <div class="form-area" id="roughForm">
      <h3>扔点货进来</h3>
      <form id="publishForm">
        <div class="form-group">
          <label for="itemName">商品名</label>
          <input type="text" id="itemName" placeholder="比如 老六专用镐" required>
        </div>
        <div class="form-group">
          <label for="itemPrice">单价（泥土）</label>
          <input type="number" id="itemPrice" placeholder="数字" min="1" required>
        </div>
        <div class="form-group">
          <label for="itemQty">剩余数量（个）</label>
          <input type="number" id="itemQty" placeholder="多少个" min="1" required>
        </div>
        <div class="form-group">
          <label for="itemSeller">你的游戏ID</label>
          <input type="text" id="itemSeller" placeholder="游戏名" required>
        </div>
        <div class="form-group">
          <label for="itemPassword">管理密码（至少4位）</label>
          <input type="password" id="itemPassword" placeholder="用于修改/下架商品" required>
        </div>
        <div class="form-group icon-selector">
          <label for="iconSearch">选个图标（搜名称）</label>
          <input type="text" id="iconSearch" placeholder="比如 Bamboo Door" autocomplete="off">
          <div class="icon-dropdown" id="iconDropdown"></div>
          <div class="icon-preview">
            <img src="/img/dirt.png" alt="默认图标" id="selectedIconImg">
            <span id="selectedIconName">泥土（默认）</span>
          </div>
          <input type="hidden" id="selectedIconUrl" value="/img/dirt.png">
        </div>
        <button type="submit" id="submitBtn">扔进集市</button>
      </form>

      <div class="manage-toggle" id="manageToggle">
        <span>管理我的商品</span>
        <span class="arrow">▶</span>
      </div>
      <div class="manage-panel" id="managePanel">
        <div class="form-group">
          <label for="manageSeller">游戏ID</label>
          <input type="text" id="manageSeller" placeholder="你的游戏名">
        </div>
        <div class="form-group">
          <label for="managePassword">管理密码</label>
          <input type="password" id="managePassword" placeholder="输入密码查看我的商品">
        </div>
        <button id="manageBtn">翻我的摊</button>
        <div id="manageResults"></div>
        <div class="easter-egg" style="font-size:6px; color:#1a1a1a; user-select:all; opacity:0.3; text-align:center; margin-top:0.5rem;">
  R3-WakOl^d~KW3iTJk,&/JWrPdK
</div>
      </div>
    </div>
  </div>

  <div class="footer-note">再也不用在群里找人了</div>
</div>

<script src="/shop/script.js"></script>
</body>
</html>
