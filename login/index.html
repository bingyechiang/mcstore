<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>玩家登录 · 泥土商店</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* 极简登录样式（无多余设计） */
    .login-container {
      max-width: 400px;
      margin: 5rem auto;
      background: #1a1a1a;
      padding: 2rem;
      border: 2px solid #2a2a2a;
      border-radius: 30px;
    }
    .login-container h2 {
      color: #ece7db;
      font-weight: 400;
      border-left: 6px solid #E85D04;
      padding-left: 1rem;
      margin-bottom: 1.5rem;
    }
    .login-container label {
      color: #8a847a;
      display: block;
      margin: 0.8rem 0 0.2rem 0;
      font-size: 0.9rem;
    }
    .login-container input {
      width: 100%;
      padding: 0.6rem 1rem;
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 30px;
      color: #ece7db;
      font-family: inherit;
      font-size: 1rem;
    }
    .login-container button {
      width: 100%;
      margin-top: 1.5rem;
      background: #E85D04;
      border: none;
      color: #121212;
      font-weight: 700;
      padding: 0.7rem;
      border-radius: 40px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }
    .login-container button:hover {
      background: #ff7b1a;
      transform: scale(0.97);
    }
    .login-container .error {
      color: #ff4d4d;
      margin-top: 0.8rem;
      text-align: center;
    }
    .login-container .info {
      color: #6a655a;
      margin-top: 1rem;
      text-align: center;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<div class="container" style="justify-content:center; align-items:center; min-height:100vh;">
  <div class="login-container">
    <h2>玩家登录</h2>
    <form id="loginForm">
      <label for="username">游戏ID</label>
      <input type="text" id="username" placeholder="你的游戏ID" required>
      <label for="password">密码（从QQ群获取）</label>
      <input type="password" id="password" placeholder="密码" required>
      <button type="submit">进入集市</button>
    </form>
    <div id="errorMsg" class="error"></div>
    <div class="info">还没密码？联系QQ群管理员获取</div>
  </div>
</div>
<script src="/login/script.js"></script>
</body>
</html>
